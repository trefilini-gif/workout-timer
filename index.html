<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <link rel="manifest" href="manifest.json" />
  <title>Workout Timer</title>
  <style>
    :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; background: #111827; color: white; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
    .app { width: min(420px, 100%); text-align: center; }
    h1 { margin: 0 0 8px; font-size: 34px; }
    .sub { margin: 0 0 24px; color: #9ca3af; }
    .circle { width: min(78vw, 320px); height: min(78vw, 320px); border-radius: 50%; border: 14px solid rgba(255,255,255,.14); display: grid; place-items: center; margin: 0 auto 24px; position: relative; }
    .circle::before { content: ''; position: absolute; inset: -14px; border-radius: 50%; border: 14px solid var(--accent, #22c55e); clip-path: polygon(50% 50%, 50% 0, 100% 0, 100% 100%, 0 100%, 0 0, 50% 0); opacity: .9; }
    .phase { font-size: 25px; font-weight: 700; color: var(--accent, #22c55e); }
    .time { font-size: 74px; line-height: 1; font-weight: 800; font-variant-numeric: tabular-nums; margin: 8px 0; }
    .round { color: #d1d5db; font-size: 18px; }
    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    button { border: 0; border-radius: 16px; padding: 16px; font-size: 18px; font-weight: 700; color: white; background: #374151; }
    button.primary { background: #2563eb; }
    .settings { background: rgba(255,255,255,.08); border-radius: 20px; padding: 16px; display: grid; gap: 14px; }
    label { display: grid; grid-template-columns: 1fr 120px; gap: 12px; align-items: center; text-align: left; color: #d1d5db; }
    input { width: 100%; box-sizing: border-box; border-radius: 12px; border: 1px solid rgba(255,255,255,.18); background: #111827; color: white; padding: 12px; font-size: 18px; text-align: center; }
    .hint { color: #9ca3af; font-size: 13px; margin-top: 16px; line-height: 1.35; }
  </style>
</head>
<body>
  <main class="app">
    <h1>Workout Timer</h1>
    <p class="sub">Работа / отдых / раунды</p>

    <section class="circle" id="circle">
      <div>
        <div class="phase" id="phase">Готов к старту</div>
        <div class="time" id="time">00:40</div>
        <div class="round" id="round">Раунд 1 из 5</div>
      </div>
    </section>

    <div class="buttons">
      <button class="primary" id="start">Старт</button>
      <button id="reset">Сброс</button>
    </div>

    <section class="settings">
      <label>Работа, сек <input id="work" type="number" min="5" max="600" step="5" value="40"></label>
      <label>Отдых, сек <input id="rest" type="number" min="0" max="300" step="5" value="20"></label>
      <label>Раунды <input id="rounds" type="number" min="1" max="30" step="1" value="5"></label>
    </section>

    <p class="hint">На iPhone можно открыть файл/страницу в Safari и добавить на экран «Домой». Для полноценного приложения лучше использовать SwiftUI-версию из архива.</p>
  </main>

  <script>
    const el = id => document.getElementById(id);
    const state = { running: false, phase: 'idle', work: 40, rest: 20, rounds: 5, current: 1, left: 40, timer: null };

    function fmt(s) { return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0'); }
    function beep() {
      if (navigator.vibrate) navigator.vibrate(160);
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.08;
        osc.start(); setTimeout(() => { osc.stop(); ctx.close(); }, 180);
      } catch (_) {}
    }
    function readSettings() {
      state.work = Math.max(5, Number(el('work').value || 40));
      state.rest = Math.max(0, Number(el('rest').value || 20));
      state.rounds = Math.max(1, Number(el('rounds').value || 5));
      if (!state.running && (state.phase === 'idle' || state.phase === 'finished')) state.left = state.work;
    }
    function render() {
      el('phase').textContent = state.phase === 'work' ? 'Работа' : state.phase === 'rest' ? 'Отдых' : state.phase === 'finished' ? 'Финиш' : 'Готов к старту';
      el('time').textContent = fmt(state.left);
      el('round').textContent = `Раунд ${state.current} из ${state.rounds}`;
      el('start').textContent = state.running ? 'Пауза' : 'Старт';
      document.documentElement.style.setProperty('--accent', state.phase === 'rest' ? '#f59e0b' : '#22c55e');
    }
    function startPause() {
      readSettings();
      if (state.running) { clearInterval(state.timer); state.running = false; render(); return; }
      if (state.phase === 'idle' || state.phase === 'finished') { state.phase = 'work'; state.current = 1; state.left = state.work; }
      state.running = true;
      state.timer = setInterval(tick, 1000);
      render();
    }
    function tick() {
      if (state.left > 1) { state.left--; render(); return; }
      beep();
      if (state.phase === 'work' && state.rest > 0) { state.phase = 'rest'; state.left = state.rest; }
      else if (state.current < state.rounds) { state.current++; state.phase = 'work'; state.left = state.work; }
      else { clearInterval(state.timer); state.running = false; state.phase = 'finished'; state.left = 0; beep(); }
      render();
    }
    function reset() { clearInterval(state.timer); readSettings(); Object.assign(state, { running: false, phase: 'idle', current: 1, left: state.work }); render(); }

    ['work','rest','rounds'].forEach(id => el(id).addEventListener('change', reset));
    el('start').addEventListener('click', startPause);
    el('reset').addEventListener('click', reset);
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(() => {});
    render();
  </script>
</body>
</html>
