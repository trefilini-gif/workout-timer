<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff2f67" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Таймер" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>Таймер для тренировок</title>
  <style>
    :root {
      --pink: #ff2f67;
      --red: #ff4b43;
      --green: #59df9e;
      --green-bg: #e9fbf2;
      --rose: #ff315f;
      --rose-bg: #ffe4ec;
      --blue: #527cff;
      --blue-bg: #e9ecff;
      --yellow: #f4cf4e;
      --yellow-bg: #fff8de;
      --gray-bg: #f2f2f4;
      --text: #22232a;
      --muted: #9c9ca4;
      --card-radius: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; background: #ffffff; color: var(--text); }
    body { overflow-x: hidden; }
    button, input { font: inherit; }

    .app {
      min-height: 100vh;
      min-height: 100dvh;
      background: #fff;
      position: relative;
    }

    .hero {
      height: 31svh;
      min-height: 218px;
      max-height: 300px;
      color: white;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.22), rgba(255,255,255,0) 26%),
        linear-gradient(135deg, #ff5743 0%, #ff285d 48%, #f21562 100%);
      padding: calc(8px + var(--safe-top)) 20px 0;
      position: relative;
      overflow: hidden;
      transition: background .28s ease, box-shadow .28s ease;
    }

    .app.phase-work .hero {
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.22), rgba(255,255,255,0) 26%),
        linear-gradient(135deg, #2ad37f 0%, #19bd6c 48%, #079a56 100%);
      box-shadow: inset 0 -40px 80px rgba(0, 102, 52, .10);
    }

    .app.phase-rest .hero {
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.22), rgba(255,255,255,0) 26%),
        linear-gradient(135deg, #ff5948 0%, #ff263f 48%, #d70f2d 100%);
      box-shadow: inset 0 -40px 80px rgba(130, 0, 24, .12);
    }

    .app.phase-roundreset .hero {
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.22), rgba(255,255,255,0) 26%),
        linear-gradient(135deg, #f6d75a 0%, #f0b83a 48%, #e49921 100%);
      box-shadow: inset 0 -40px 80px rgba(132, 82, 0, .12);
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      right: -70px;
      top: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      filter: blur(2px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 42px;
      position: relative;
      z-index: 2;
    }

    .menu-btn, .ghost-btn {
      position: absolute;
      left: 0;
      top: 0;
      width: 44px;
      height: 44px;
      border: 0;
      background: transparent;
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      border-radius: 14px;
    }

    .hamburger {
      width: 28px;
      height: 21px;
      display: grid;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      height: 4px;
      border-radius: 4px;
      background: currentColor;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: .2px;
      font-weight: 800;
      text-transform: lowercase;
    }

    .total-time {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      height: calc(100% - 50px);
      padding-top: 12px;
      padding-bottom: 62px;
      font-size: clamp(66px, 20vw, 106px);
      font-weight: 300;
      letter-spacing: -3px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 12px 30px rgba(148, 18, 56, .15);
    }

    .sheet {
      background: #fff;
      border-radius: 22px 22px 0 0;
      margin-top: -42px;
      min-height: calc(69svh + 42px);
      padding: 62px 20px calc(12px + var(--safe-bottom));
      position: relative;
      z-index: 3;
      box-shadow: 0 -10px 22px rgba(43, 20, 35, .03);
    }

    .play-wrap {
      position: absolute;
      left: 50%;
      top: -26px;
      transform: translateX(-50%);
      width: 128px;
      height: 128px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 6px 22px rgba(233, 22, 87, .12);
    }

    .play-btn {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: 0;
      background: #fff;
      color: var(--pink);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.04);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform .16s ease;
    }

    .play-btn:active { transform: scale(.96); }

    .play-icon, .pause-icon {
      width: 40px;
      height: 40px;
      display: block;
    }
    .pause-icon { display: none; }
    .running .play-icon { display: none; }
    .running .pause-icon { display: block; }

    .reset-btn {
      position: absolute;
      right: 18px;
      top: 4px;
      width: 54px;
      height: 54px;
      border-radius: 19px;
      border: 0;
      background: rgba(255,255,255,.95);
      color: var(--pink);
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .phase-line {
      text-align: center;
      margin-top: 8px;
      margin-bottom: 10px;
      height: 26px;
      color: #7a7a84;
      font-size: 15px;
      font-weight: 700;
    }

    .phase-line strong { color: var(--text); }

    .card-list { display: grid; gap: 10px; }

    .card {
      height: 72px;
      border-radius: var(--card-radius);
      padding: 0 22px 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      cursor: pointer;
      user-select: none;
    }

    .card:active { transform: scale(.992); }
    .card:focus-visible { outline: 3px solid rgba(255,47,103,.28); outline-offset: 3px; }

    .card.disabled { background: #eeeeef; color: #9b9ba2; }
    .card.work { background: var(--green-bg); }
    .card.rest { background: var(--rose-bg); }
    .card.exercises { background: var(--gray-bg); }
    .card.rounds { background: var(--blue-bg); }
    .card.roundreset { background: var(--yellow-bg); }

    .card.active {
      transform: scale(1.018);
      box-shadow: 0 14px 26px rgba(0,0,0,.08);
    }

    .card.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--progress, 0%);
      opacity: .28;
      background: currentColor;
      transition: width .25s linear;
    }

    .card-content, .card-value { position: relative; z-index: 2; }

    .card-content {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 22px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon {
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      display: grid;
      place-items: center;
    }

    .card-value {
      font-size: 25px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .work { color: var(--green); }
    .rest { color: var(--rose); }
    .rounds { color: var(--blue); }
    .roundreset { color: var(--yellow); }
    .exercises { color: #aaa; }
    .card .card-title { color: var(--text); }
    .card.disabled .card-title { color: #8d8d93; }

    .progress-note {
      margin: 10px 2px 0;
      color: #858590;
      font-size: 14px;
      text-align: center;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(22, 22, 30, .34);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .drawer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 21;
      background: #fff;
      border-radius: 26px 26px 0 0;
      padding: 16px 20px calc(18px + var(--safe-bottom));
      transform: translateY(110%);
      transition: transform .24s ease;
      max-height: 86vh;
      overflow-y: auto;
      box-shadow: 0 -18px 50px rgba(0,0,0,.18);
    }

    .drawer-open .drawer-backdrop { opacity: 1; pointer-events: auto; }
    .drawer-open .drawer { transform: translateY(0); }

    .handle {
      width: 42px;
      height: 5px;
      border-radius: 9px;
      background: #d8d8de;
      margin: 0 auto 16px;
    }

    .drawer h2 {
      margin: 0 0 14px;
      font-size: 25px;
      letter-spacing: -.5px;
    }

    .setting {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      min-height: 58px;
      border-bottom: 1px solid #efeff2;
    }

    .setting label {
      font-size: 17px;
      font-weight: 700;
      color: #2d2d34;
    }

    .setting.focused {
      margin: 6px -8px;
      padding: 0 8px;
      border-radius: 18px;
      background: #fff3f6;
      border-bottom-color: transparent;
      box-shadow: inset 0 0 0 2px rgba(255,47,103,.12);
    }


    .stepper {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 18px;
      background: #f3f3f6;
      padding: 6px;
    }

    .stepper button {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 12px;
      background: #fff;
      color: #33343b;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(0,0,0,.06);
    }

    .stepper span {
      min-width: 60px;
      text-align: center;
      font-size: 17px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .drawer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .primary, .secondary {
      height: 54px;
      border-radius: 18px;
      border: 0;
      font-weight: 800;
      cursor: pointer;
      font-size: 17px;
    }

    .primary {
      color: #fff;
      background: linear-gradient(135deg, #ff5544, #ff2b64);
      box-shadow: 0 10px 22px rgba(255, 48, 93, .22);
    }

    .secondary { color: #33343b; background: #f0f0f3; }

    .quick-presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0 4px;
    }

    .preset {
      height: 42px;
      border-radius: 15px;
      border: 0;
      background: #f4f4f6;
      color: #292a31;
      font-weight: 800;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(20px + var(--safe-bottom));
      transform: translateX(-50%) translateY(90px);
      background: rgba(31, 31, 38, .92);
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 15px;
      z-index: 30;
      opacity: 0;
      transition: .24s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .qe-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(22, 22, 30, .34);
      z-index: 34;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .quick-editor {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 35;
      background: #fff;
      border-radius: 28px 28px 0 0;
      padding: 16px 20px calc(20px + var(--safe-bottom));
      transform: translateY(110%);
      transition: transform .24s ease;
      box-shadow: 0 -18px 50px rgba(0,0,0,.18);
    }

    .quick-editor-open .qe-backdrop { opacity: 1; pointer-events: auto; }
    .quick-editor-open .quick-editor { transform: translateY(0); }

    .qe-subtitle {
      margin: -6px 0 16px;
      color: #7b7b84;
      font-size: 15px;
      text-align: center;
    }

    .qe-stepper {
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      gap: 12px;
      align-items: center;
      margin: 10px 0 18px;
    }

    .qe-step {
      height: 56px;
      border-radius: 18px;
      border: 0;
      background: #f3f3f6;
      color: #2c2d34;
      font-size: 32px;
      font-weight: 700;
      cursor: pointer;
    }

    .qe-value {
      text-align: center;
      font-size: 40px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -1.5px;
      font-variant-numeric: tabular-nums;
      color: #26272e;
    }

    .qe-presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .qe-chip {
      height: 44px;
      border-radius: 15px;
      border: 0;
      background: #f4f4f6;
      color: #292a31;
      font-weight: 800;
      cursor: pointer;
    }

    .history-screen {
      position: fixed;
      inset: 0;
      background: #f7f7fa;
      z-index: 42;
      transform: translateX(110%);
      transition: transform .26s ease;
      display: flex;
      flex-direction: column;
      padding: calc(10px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
    }

    .history-open .history-screen { transform: translateX(0); }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .history-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.7px;
    }

    .history-top-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      min-width: 44px;
      height: 44px;
      padding: 0 14px;
      border: 0;
      border-radius: 14px;
      background: #fff;
      color: #30313a;
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
      cursor: pointer;
    }

    .history-list {
      flex: 1;
      overflow: auto;
      display: grid;
      gap: 12px;
      padding-bottom: 8px;
    }

    .history-card {
      background: #fff;
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 8px 18px rgba(0,0,0,.05);
    }

    .history-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .history-date {
      font-size: 16px;
      font-weight: 800;
      color: #24252d;
    }

    .history-duration {
      font-size: 14px;
      color: #7b7b84;
      white-space: nowrap;
    }

    .history-summary {
      font-size: 15px;
      color: #666772;
      margin-bottom: 12px;
      line-height: 1.35;
    }

    .history-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .mini-primary, .mini-secondary {
      height: 44px;
      border-radius: 14px;
      border: 0;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
    }

    .mini-primary {
      color: #fff;
      background: linear-gradient(135deg, #ff5544, #ff2b64);
    }

    .mini-secondary {
      width: 44px;
      color: #363741;
      background: #f2f2f5;
    }

    .history-empty {
      background: #fff;
      border-radius: 20px;
      padding: 24px 18px;
      text-align: center;
      color: #7b7b84;
      box-shadow: 0 8px 18px rgba(0,0,0,.05);
      line-height: 1.45;
    }




    body.dark-theme,
    body.dark-theme .app {
      background: #111218;
      color: #f6f6f8;
    }
    body.dark-theme .sheet,
    body.dark-theme .drawer,
    body.dark-theme .quick-editor,
    body.dark-theme .history-card,
    body.dark-theme .history-empty,
    body.dark-theme .icon-btn {
      background: #1b1c24;
      color: #f6f6f8;
    }
    body.dark-theme .history-screen { background: #111218; }
    body.dark-theme .card-title,
    body.dark-theme .drawer h2,
    body.dark-theme .history-date,
    body.dark-theme .history-title,
    body.dark-theme .qe-value,
    body.dark-theme .setting label { color: #f6f6f8; }
    body.dark-theme .phase-line,
    body.dark-theme .progress-note,
    body.dark-theme .qe-subtitle,
    body.dark-theme .history-summary,
    body.dark-theme .history-duration { color: #b7b7c2; }
    body.dark-theme .stepper,
    body.dark-theme .qe-step,
    body.dark-theme .qe-chip,
    body.dark-theme .secondary,
    body.dark-theme .mini-secondary { background: #292a33; color: #f6f6f8; }
    body.dark-theme .stepper button { background: #383945; color: #fff; }
    body.dark-theme .card.exercises { background: #2a2b33; }
    body.dark-theme .card.work { background: #12352a; }
    body.dark-theme .card.rest { background: #3a1722; }
    body.dark-theme .card.rounds { background: #1b2140; }
    body.dark-theme .card.roundreset { background: #342d16; }
    body.dark-theme .play-wrap,
    body.dark-theme .play-btn,
    body.dark-theme .reset-btn { background: #1b1c24; }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .template-card {
      min-height: 72px;
      border: 0;
      border-radius: 18px;
      background: #f4f4f6;
      padding: 12px;
      text-align: left;
      cursor: pointer;
    }
    .template-name { display: block; font-size: 16px; font-weight: 900; color: #25262e; margin-bottom: 4px; }
    .template-meta { display: block; font-size: 13px; color: #73737d; line-height: 1.25; }
    body.dark-theme .template-card { background: #292a33; }
    body.dark-theme .template-name { color: #fff; }
    body.dark-theme .template-meta { color: #b7b7c2; }

    .theme-toggle-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #efeff2;
    }
    body.dark-theme .theme-toggle-row { border-top-color: #30313b; }
    .theme-toggle-row span { font-size: 17px; font-weight: 800; }
    .theme-toggle {
      width: 84px;
      height: 44px;
      border: 0;
      border-radius: 999px;
      background: #f1f1f4;
      color: #30313a;
      font-weight: 900;
      cursor: pointer;
    }
    body.dark-theme .theme-toggle { background: #30313b; color: #fff; }

    @media (max-width: 380px), (max-height: 760px) {
      .hero { min-height: 200px; height: 29svh; }
      .sheet { margin-top: -36px; padding: 54px 14px calc(8px + var(--safe-bottom)); }
      .card-list { gap: 8px; }
      .card { height: 66px; padding-left: 18px; padding-right: 18px; border-radius: 16px; }
      .card-content { gap: 14px; }
      .icon { width: 28px; height: 28px; flex-basis: 28px; }
      .icon svg { width: 28px; height: 28px; }
      .card-title { font-size: 19px; }
      .card-value { font-size: 22px; }
      h1 { font-size: 20px; }
      .topbar { height: 38px; }
      .total-time { font-size: clamp(58px, 18vw, 88px); letter-spacing: -2px; padding-top: 8px; padding-bottom: 42px; }
      .play-wrap { width: 92px; height: 92px; top: -22px; }
      .play-btn { width: 70px; height: 70px; }
      .reset-btn { width: 48px; height: 48px; border-radius: 16px; top: 8px; right: 14px; }
      .phase-line { margin-top: 10px; margin-bottom: 8px; font-size: 14px; height: 22px; }
      .progress-note { margin-top: 8px; font-size: 13px; }
    }

    @media (display-mode: standalone) {
      .hero { height: 32svh; min-height: 230px; }
    }
  </style>
</head>
<body>
  <main id="app" class="app">
    <section class="hero">
      <div class="topbar">
        <button class="menu-btn" id="openSettings" aria-label="Открыть настройки">
          <span class="hamburger"><span></span><span></span><span></span></span>
        </button>
        <h1>таймер для тренировок</h1>
      </div>
      <div class="total-time" id="totalTime">15:00</div>
    </section>

    <section class="sheet">
      <div class="play-wrap">
        <button class="play-btn" id="playPause" aria-label="Старт / пауза">

          <svg class="pause-icon" viewBox="0 0 50 50" aria-hidden="true"><rect x="15" y="11" width="8" height="28" rx="3" fill="currentColor"/><rect x="28" y="11" width="8" height="28" rx="3" fill="currentColor"/></svg>

      <div class="phase-line" id="phaseLine">Готово к тренировке</div>

      <div class="card-list">

            <span class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.4"/><rect x="9" y="7.5" width="2.5" height="9" rx="1" fill="currentColor"/><rect x="12.5" y="7.5" width="2.5" height="9" rx="1" fill="currentColor"/></svg></span>
            <span class="card-title">Отдых</span>

          <span class="card-value" id="restValue">00:20</span>
        </article>

        <article class="card exercises" id="card-exercise" role="button" tabindex="0" data-open-setting="exercises">

            <span class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.2"/><path d="M12 6v6l3.5 2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M12 2.5v3M12 18.5v3M21.5 12h-3M5.5 12h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>

        <article class="card rounds" id="card-round" role="button" tabindex="0" data-open-setting="rounds">
          <div class="card-content">
            <span class="icon"><svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M19 7v5h-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 13.4A7 7 0 1 1 16.6 6L19 8.3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>

            <span class="card-title">Сброс круга</span>

        <div class="stepper"><button data-step="-5">−</button><span id="set-rest">00:20</span><button data-step="5">+</button></div>

        <label>Сброс круга</label>
        <div class="stepper"><button data-step="-5">−</button><span id="set-roundReset">00:30</span><button data-step="5">+</button></div>
      </div>

        <label>Звук и вибрация</label>
        <div class="stepper"><button data-toggle="sound">↻</button><span id="set-sound">Да</span></div>
      </div>

      <div class="drawer-actions">
        <button class="secondary" id="closeSettings">Закрыть</button>
        <button class="secondary" id="openHistoryFromDrawer">История</button>
        <button class="primary" id="applySettings">Применить</button>

    <div class="qe-backdrop" id="qeBackdrop"></div>
    <section class="quick-editor" id="quickEditor" aria-label="Быстрая настройка">
      <div class="handle"></div>
      <h2 id="qeTitle">Настройка</h2>
      <p class="qe-subtitle" id="qeSubtitle">Измените значение</p>
      <div class="qe-stepper">
        <button class="qe-step" id="qeMinus" aria-label="Уменьшить">−</button>
        <div class="qe-value" id="qeValue">00:40</div>
        <button class="qe-step" id="qePlus" aria-label="Увеличить">+</button>
      </div>
      <div class="qe-presets" id="qePresets"></div>
      <div class="drawer-actions">
        <button class="secondary" id="qeCancel">Отмена</button>
        <div></div>
        <button class="primary" id="qeSave">Сохранить</button>
      </div>
    </section>

    <section class="history-screen" id="historyScreen" aria-label="История тренировок">
      <div class="history-header">
        <h2 class="history-title">История тренировок</h2>
        <div class="history-top-actions">
          <button class="icon-btn" id="clearHistoryBtn">Очистить</button>
          <button class="icon-btn" id="closeHistoryBtn">✕</button>
        </div>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>

    <div class="toast" id="toast">Сохранено</div>
  </main>

  <script>
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => Array.from(document.querySelectorAll(sel));

    const app = $('#app');
    const totalTimeEl = $('#totalTime');
    const playPauseBtn = $('#playPause');
    const resetBtn = $('#resetBtn');
    const phaseLine = $('#phaseLine');
    const progressNote = $('#progressNote');
    const drawerBackdrop = $('#drawerBackdrop');
    const toast = $('#toast');
    const historyList = $('#historyList');

    const CONFIG_KEY = 'sportTimerConfig';
    const HISTORY_KEY = 'sportTimerHistory';

    const defaultConfig = {
      work: 40,
      rest: 20,
      exercises: 5,
      rounds: 3,
      roundReset: 30,
      sound: true,
      voice: true,
      soundProfile: 'classic',
      darkTheme: false
    };

    const settingNames = {
      work: 'Работа',
      rest: 'Отдых',
      exercises: 'Упражнения',
      rounds: 'Круги',
      roundReset: 'Сброс круга'
    };

    const workoutTemplates = [
      { id: 'tabata', name: 'Табата 40/20', meta: '5 упр. · 3 круга', config: { work: 40, rest: 20, exercises: 5, rounds: 3, roundReset: 30 } },
      { id: 'power', name: 'Силовая', meta: '45/30 · 4 упр. · 4 круга', config: { work: 45, rest: 30, exercises: 4, rounds: 4, roundReset: 60 } },
      { id: 'quick', name: 'Быстрая', meta: '30/15 · 4 упр. · 2 круга', config: { work: 30, rest: 15, exercises: 4, rounds: 2, roundReset: 30 } },
      { id: 'emom', name: 'EMOM', meta: '60/0 · 5 упр. · 3 круга', config: { work: 60, rest: 0, exercises: 5, rounds: 3, roundReset: 0 } }
    ];

    const soundProfiles = {
      classic: { work: 720, rest: 420, countdown: 980, finish: 880 },
      soft: { work: 620, rest: 360, countdown: 760, finish: 700 },
      sharp: { work: 980, rest: 520, countdown: 1180, finish: 1040 }
    };

    let config = loadConfig();
    let tempConfig = { ...config };
    let timeline = [];
    let phaseIndex = 0;
    let phaseRemaining = 0;
    let totalRemaining = 0;
    let running = false;
    let intervalId = null;
    let audioCtx = null;
    let currentEditKey = null;
    let currentEditValue = 0;
    let historySavedForCurrentRun = false;
    let workoutStarted = false;

    function loadConfig() {
      try {
        const stored = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
        return { ...defaultConfig, ...stored };
      } catch {
        return { ...defaultConfig };
      }
    }

    function saveConfig() {
      localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    }

    function loadHistory() {
      try {
        const items = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        return Array.isArray(items) ? items : [];
      } catch {
        return [];
      }
    }

    function saveHistory(items) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, 30)));
    }

    function mmss(seconds) {
      const s = Math.max(0, Math.round(seconds));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return String(m).padStart(2, '0') + ':' + String(r).padStart(2, '0');
    }

    function formatDate(value) {
      const d = new Date(value);
      return d.toLocaleString('ru-RU', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function buildTimeline() {
      const items = [];
      for (let r = 1; r <= config.rounds; r++) {
        for (let e = 1; e <= config.exercises; e++) {
          items.push({ type: 'work', label: 'Работа', duration: config.work, round: r, exercise: e });
          if (config.rest > 0) items.push({ type: 'rest', label: 'Отдых', duration: config.rest, round: r, exercise: e });
        }
        if (config.roundReset > 0 && r < config.rounds) {
          items.push({ type: 'roundreset', label: 'Сброс круга', duration: config.roundReset, round: r, exercise: config.exercises });
        }
      }
      return items.filter(item => item.duration > 0);
    }

    function totalSecondsForDisplay() {
      const base = config.rounds * config.exercises * (config.work + config.rest);
      const reset = Math.max(0, config.rounds - 1) * config.roundReset;
      return base + reset;
    }

    function clearActiveCards() {
      ['work', 'rest', 'exercise', 'round', 'roundreset'].forEach(id => {
        const card = $('#card-' + id);
        if (card) {
          card.classList.remove('active');
          card.style.setProperty('--progress', '0%');
        }
      });
    }

    function resetTimer(silent = false) {
      stopTick();
      timeline = buildTimeline();
      phaseIndex = 0;
      phaseRemaining = timeline[0]?.duration || 0;
      totalRemaining = totalSecondsForDisplay();
      running = false;
      historySavedForCurrentRun = false;
      workoutStarted = false;
      app.classList.remove('running', 'phase-work', 'phase-rest', 'phase-roundreset');
      updateUi();
      if (!silent) notify('Сброшено');
    }

    function startTimer() {
      if (!timeline.length || totalRemaining <= 0) resetTimer(true);
      running = true;
      workoutStarted = true;
      app.classList.add('running');
      warmAudio();
      beep(560, 90);
      tick();
      intervalId = setInterval(tick, 1000);
      updateUi();
    }

    function pauseTimer() {
      running = false;
      app.classList.remove('running');
      stopTick();
      updateUi();
    }

    function stopTick() {
      if (intervalId) clearInterval(intervalId);
      intervalId = null;
    }

    function tick() {
      if (!running) return;

      if (phaseRemaining <= 0) {
        phaseIndex++;
        if (phaseIndex >= timeline.length || totalRemaining <= 0) {
          finishWorkout();
          return;
        }
        phaseRemaining = timeline[phaseIndex].duration;
        phaseSignal(timeline[phaseIndex].type);
      }

      if (phaseRemaining > 0 && phaseRemaining <= 3) countdownSignal(phaseRemaining);

      updateUi();
      phaseRemaining--;
      totalRemaining = Math.max(0, totalRemaining - 1);
    }

    function finishWorkout() {
      stopTick();
      running = false;
      workoutStarted = false;
      app.classList.remove('running', 'phase-work', 'phase-rest', 'phase-roundreset');
      totalRemaining = 0;
      phaseRemaining = 0;
      phaseLine.innerHTML = '<strong>Тренировка завершена</strong>';
      clearActiveCards();
      totalTimeEl.textContent = '00:00';
      if (!historySavedForCurrentRun) addHistoryEntry();
      historySavedForCurrentRun = true;
      renderHistory();
      if (config.sound) {
        const profile = soundProfiles[config.soundProfile] || soundProfiles.classic;
        beep(profile.finish, 160);
        setTimeout(() => beep(profile.finish, 160), 220);
        setTimeout(() => beep(profile.finish, 260), 440);
        vibrate([120, 80, 120, 80, 200]);
      }
    }

    function addHistoryEntry() {
      const history = loadHistory();
      history.unshift({
        id: Date.now(),
        completedAt: new Date().toISOString(),
        totalDuration: totalSecondsForDisplay(),
        config: {
          work: config.work,
          rest: config.rest,
          exercises: config.exercises,
          rounds: config.rounds,
          roundReset: config.roundReset,
          sound: config.sound
        }
      });
      saveHistory(history);
    }

    function renderHistory() {
      const history = loadHistory();
      if (!history.length) {
        historyList.innerHTML = '<div class="history-empty">Пока история пуста.<br>После завершения тренировки здесь появятся сохранённые тренировки.</div>';
        return;
      }

      historyList.innerHTML = history.map(item => `
        <article class="history-card" data-history-id="${item.id}">
          <div class="history-card-head">
            <div class="history-date">${formatDate(item.completedAt)}</div>
            <div class="history-duration">${mmss(item.totalDuration)}</div>
          </div>
          <div class="history-summary">${mmss(item.config.work)} работа · ${mmss(item.config.rest)} отдых · ${item.config.exercises} упр. · ${item.config.rounds} круг. · сброс ${mmss(item.config.roundReset)}</div>
          <div class="history-actions">
            <button class="mini-primary" data-history-action="apply">Применить</button>
            <button class="mini-secondary" data-history-action="delete">🗑</button>
          </div>
        </article>
      `).join('');
    }

    function renderTemplates() {
      const grid = $('#templateGrid');
      if (!grid) return;
      grid.innerHTML = workoutTemplates.map(t => `
        <button class="template-card" type="button" data-template-id="${t.id}">
          <span class="template-name">${t.name}</span>
          <span class="template-meta">${t.meta}</span>
        </button>
      `).join('');
    }

    function applyTemplate(id) {
      const t = workoutTemplates.find(item => item.id === id);
      if (!t) return;
      tempConfig = { ...tempConfig, ...t.config };
      renderSettings();
      notify('Шаблон выбран');
    }

    function applyHistoryItem(id) {
      const history = loadHistory();
      const item = history.find(entry => String(entry.id) === String(id));
      if (!item) return;
      config = { ...config, ...item.config };
      tempConfig = { ...config };
      saveConfig();
      resetTimer(true);
      closeHistory();
      closeSettings();
      notify('Тренировка загружена');
    }

    function deleteHistoryItem(id) {
      const history = loadHistory().filter(entry => String(entry.id) !== String(id));
      saveHistory(history);
      renderHistory();
      notify('Удалено');
    }

    function clearHistory() {
      saveHistory([]);
      renderHistory();
      notify('История очищена');
    }

    function phaseSignal(type) {
      if (!config.sound) return;
      const profile = soundProfiles[config.soundProfile] || soundProfiles.classic;
      beep(type === 'work' ? profile.work : profile.rest, 120);
      vibrate(type === 'work' ? 80 : [60, 50, 60]);
    }

    function countdownSignal(secondsLeft) {
      if (!config.sound) return;
      if (config.voice) speakCountdown(secondsLeft);
      else beep(soundProfiles[config.soundProfile]?.countdown || 980, secondsLeft === 1 ? 120 : 80);
    }

    function speakCountdown(secondsLeft) {
      try {
        if (!('speechSynthesis' in window)) {
          beep(soundProfiles[config.soundProfile]?.countdown || 980, 90);
          return;
        }
        window.speechSynthesis.cancel();
        const phrase = secondsLeft === 1 ? 'Старт' : String(secondsLeft);
        const utterance = new SpeechSynthesisUtterance(phrase);
        utterance.lang = 'ru-RU';
        utterance.rate = 1.05;
        utterance.volume = 1;
        window.speechSynthesis.speak(utterance);
      } catch {
        beep(soundProfiles[config.soundProfile]?.countdown || 980, 90);
      }
    }

    function warmAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch {}
    }

    function beep(freq, duration) {
      if (!config.sound) return;
      try {
        warmAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.22, audioCtx.currentTime + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration / 1000);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration / 1000 + 0.02);
      } catch {}
    }

    function vibrate(pattern) {
      if ('vibrate' in navigator) navigator.vibrate(pattern);
    }

    function updateUi() {
      const current = timeline[phaseIndex];
      const currentRemaining = Math.max(0, phaseRemaining);

      app.classList.remove('phase-work', 'phase-rest', 'phase-roundreset');
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) themeMeta.setAttribute('content', '#ff2f67');
      if (workoutStarted && totalRemaining > 0 && current) {
        if (current.type === 'work') {
          app.classList.add('phase-work');
          if (themeMeta) themeMeta.setAttribute('content', '#19bd6c');
        }
        if (current.type === 'rest') {
          app.classList.add('phase-rest');
          if (themeMeta) themeMeta.setAttribute('content', '#ff263f');
        }
        if (current.type === 'roundreset') {
          app.classList.add('phase-roundreset');
          if (themeMeta) themeMeta.setAttribute('content', '#f0b83a');
        }
      }

      $('#workValue').textContent = current && current.type === 'work' ? mmss(currentRemaining) : mmss(config.work);
      $('#restValue').textContent = current && current.type === 'rest' ? mmss(currentRemaining) : mmss(config.rest);
      $('#exerciseValue').textContent = String(config.exercises);
      $('#roundValue').textContent = config.rounds + 'X';
      $('#roundResetValue').textContent = current && current.type === 'roundreset' ? mmss(currentRemaining) : mmss(config.roundReset);
      totalTimeEl.textContent = mmss(totalRemaining > 0 ? totalRemaining : totalSecondsForDisplay());
      if (totalRemaining === 0 && !running && historySavedForCurrentRun) totalTimeEl.textContent = '00:00';
      progressNote.textContent = `${config.work}/${config.rest} · ${config.exercises} упр. · ${config.rounds} круг. · сброс ${config.roundReset} сек`;

      clearActiveCards();
      if ((running || (!running && totalRemaining > 0 && current)) && current) {
        const id = current.type === 'roundreset' ? 'roundreset' : current.type;
        const card = $('#card-' + id);
        const progress = current.duration ? ((current.duration - currentRemaining) / current.duration) * 100 : 0;
        if (card) {
          card.classList.add('active');
          card.style.setProperty('--progress', `${Math.min(100, Math.max(0, progress))}%`);
        }
        const prefix = running ? '' : 'Пауза · ';
        phaseLine.innerHTML = `<strong>${prefix}${current.label}</strong> · круг ${current.round}/${config.rounds} · упражнение ${current.exercise}/${config.exercises}`;
      } else if (totalRemaining <= 0 && timeline.length && historySavedForCurrentRun) {
        phaseLine.innerHTML = '<strong>Тренировка завершена</strong>';
      } else {
        phaseLine.textContent = 'Готово к тренировке';
      }

      renderSettings();
    }

    function renderSettings() {
      $('#set-work').textContent = mmss(tempConfig.work);
      $('#set-rest').textContent = mmss(tempConfig.rest);
      $('#set-exercises').textContent = String(tempConfig.exercises);
      $('#set-rounds').textContent = tempConfig.rounds + 'X';
      $('#set-roundReset').textContent = mmss(tempConfig.roundReset);
      $('#set-sound').textContent = tempConfig.sound ? (tempConfig.voice ? 'Голос' : 'Звук') : 'Нет';
      $('#themeToggle').textContent = tempConfig.darkTheme ? 'Вкл' : 'Выкл';
      document.body.classList.toggle('dark-theme', !!config.darkTheme);
    }

    function clamp(key, value) {
      const limits = {
        work: [5, 600],
        rest: [0, 600],
        exercises: [1, 30],
        rounds: [1, 20],
        roundReset: [0, 600]
      }[key];
      if (!limits) return value;
      return Math.max(limits[0], Math.min(limits[1], value));
    }

    function getStep(key) {
      return ['work', 'rest', 'roundReset'].includes(key) ? 5 : 1;
    }

    function getQuickPresets(key) {
      const presets = {
        work: [10, 20, 30, 40, 45, 60],
        rest: [0, 10, 15, 20, 30, 45],
        exercises: [1, 2, 3, 4, 5, 6, 8, 10, 12],
        rounds: [1, 2, 3, 4, 5, 6, 8, 10, 12],
        roundReset: [0, 15, 30, 45, 60, 90]
      };
      return presets[key] || [];
    }

    function formatSettingValue(key, value) {
      if (['work', 'rest', 'roundReset'].includes(key)) return mmss(value);
      if (key === 'rounds') return value + 'X';
      return String(value);
    }

    function quickEditorHint(key) {
      const hints = {
        work: 'Выберите длительность рабочего интервала',
        rest: 'Выберите длительность отдыха между упражнениями',
        exercises: 'Сколько упражнений в одном круге',
        rounds: 'Сколько кругов выполнить за тренировку',
        roundReset: 'Длительность отдыха между кругами'
      };
      return hints[key] || 'Измените значение';
    }

    function openSettings(focusKey = null) {
      tempConfig = { ...config };
      renderSettings();
      $$('.setting').forEach(row => row.classList.remove('focused'));
      $('#drawerTitle').textContent = focusKey && settingNames[focusKey] ? `Настроить: ${settingNames[focusKey]}` : 'Настройки';
      document.body.classList.add('drawer-open');
      if (focusKey) {
        requestAnimationFrame(() => {
          const row = document.querySelector(`.setting[data-key="${focusKey}"]`);
          if (row) {
            row.classList.add('focused');
            row.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }
        });
      }
    }

    function closeSettings() {
      document.body.classList.remove('drawer-open');
      setTimeout(() => {
        $('#drawerTitle').textContent = 'Настройки';
        $$('.setting').forEach(row => row.classList.remove('focused'));
      }, 220);
    }

    function applySettings() {
      config = { ...tempConfig };
      saveConfig();
      resetTimer(true);
      closeSettings();
      notify('Настройки сохранены');
    }

    function openQuickEditor(key) {
      currentEditKey = key;
      currentEditValue = config[key];
      $('#qeTitle').textContent = settingNames[key] || 'Настройка';
      $('#qeSubtitle').textContent = quickEditorHint(key);
      renderQuickEditor();
      document.body.classList.add('quick-editor-open');
    }

    function renderQuickEditor() {
      if (!currentEditKey) return;
      $('#qeValue').textContent = formatSettingValue(currentEditKey, currentEditValue);
      $('#qePresets').innerHTML = getQuickPresets(currentEditKey).map(value => (
        `<button class="qe-chip" type="button" data-qe-preset="${value}">${formatSettingValue(currentEditKey, value)}</button>`
      )).join('');
    }

    function closeQuickEditor() {
      document.body.classList.remove('quick-editor-open');
      currentEditKey = null;
    }

    function stepQuickEditor(multiplier) {
      if (!currentEditKey) return;
      currentEditValue = clamp(currentEditKey, currentEditValue + getStep(currentEditKey) * multiplier);
      renderQuickEditor();
    }

    function applyQuickEditor() {
      if (!currentEditKey) return;
      config[currentEditKey] = currentEditValue;
      saveConfig();
      resetTimer(true);
      closeQuickEditor();
      notify('Изменение сохранено');
    }

    function openHistory() {
      renderHistory();
      document.body.classList.add('history-open');
    }

    function closeHistory() {
      document.body.classList.remove('history-open');
    }

    function notify(text) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(notify._timer);
      notify._timer = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    $$('.setting').forEach(row => {
      row.addEventListener('click', (e) => {
        const key = row.dataset.key;
        const stepBtn = e.target.closest('[data-step]');
        const toggleBtn = e.target.closest('[data-toggle]');
        if (stepBtn) {
          const step = Number(stepBtn.dataset.step);
          tempConfig[key] = clamp(key, Number(tempConfig[key]) + step);
          renderSettings();
        }
        if (toggleBtn) {
          if (toggleBtn.dataset.toggle === 'sound') {
            if (!tempConfig.sound) { tempConfig.sound = true; tempConfig.voice = true; tempConfig.soundProfile = 'classic'; }
            else if (tempConfig.voice) { tempConfig.voice = false; tempConfig.soundProfile = 'soft'; }
            else if (tempConfig.soundProfile === 'soft') { tempConfig.soundProfile = 'sharp'; }
            else { tempConfig.sound = false; tempConfig.voice = false; tempConfig.soundProfile = 'classic'; }
          } else {
            const toggleKey = toggleBtn.dataset.toggle;
            tempConfig[toggleKey] = !tempConfig[toggleKey];
          }
          renderSettings();
        }
      });
    });

    $$('.preset').forEach(btn => {
      btn.addEventListener('click', () => {
        const p = btn.dataset.preset;
        if (p === 'tabata') tempConfig = { ...tempConfig, work: 40, rest: 20, exercises: 5, rounds: 3, roundReset: 30 };
        if (p === 'hiit') tempConfig = { ...tempConfig, work: 30, rest: 15, exercises: 6, rounds: 3, roundReset: 30 };
        if (p === 'emom') tempConfig = { ...tempConfig, work: 60, rest: 0, exercises: 5, rounds: 3, roundReset: 0 };
        renderSettings();
      });
    });

    $$('[data-open-setting]').forEach(card => {
      const open = () => openQuickEditor(card.dataset.openSetting);
      card.addEventListener('click', open);
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          open();
        }
      });
    });

    $('#qeMinus').addEventListener('click', () => stepQuickEditor(-1));
    $('#qePlus').addEventListener('click', () => stepQuickEditor(1));
    $('#qePresets').addEventListener('click', (e) => {
      const chip = e.target.closest('[data-qe-preset]');
      if (!chip) return;
      currentEditValue = clamp(currentEditKey, Number(chip.dataset.qePreset));
      renderQuickEditor();
    });
    $('#qeCancel').addEventListener('click', closeQuickEditor);
    $('#qeSave').addEventListener('click', applyQuickEditor);
    $('#qeBackdrop').addEventListener('click', closeQuickEditor);

    $('#templateGrid').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-template-id]');
      if (btn) applyTemplate(btn.dataset.templateId);
    });

    $('#themeToggle').addEventListener('click', () => {
      tempConfig.darkTheme = !tempConfig.darkTheme;
      config.darkTheme = tempConfig.darkTheme;
      saveConfig();
      document.body.classList.toggle('dark-theme', !!config.darkTheme);
      renderSettings();
    });

    playPauseBtn.addEventListener('click', () => running ? pauseTimer() : startTimer());
    resetBtn.addEventListener('click', () => resetTimer());
    $('#openSettings').addEventListener('click', () => openSettings());
    $('#closeSettings').addEventListener('click', closeSettings);
    $('#applySettings').addEventListener('click', applySettings);
    $('#openHistoryFromDrawer').addEventListener('click', openHistory);
    drawerBackdrop.addEventListener('click', closeSettings);

    $('#closeHistoryBtn').addEventListener('click', closeHistory);
    $('#clearHistoryBtn').addEventListener('click', clearHistory);
    historyList.addEventListener('click', (e) => {
      const article = e.target.closest('[data-history-id]');
      if (!article) return;
      const id = article.dataset.historyId;
      const action = e.target.closest('[data-history-action]')?.dataset.historyAction;
      if (action === 'apply') applyHistoryItem(id);
      if (action === 'delete') deleteHistoryItem(id);
    });

    window.addEventListener('visibilitychange', () => {
      if (document.hidden && running) pauseTimer();
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(() => {}));
    }

    renderTemplates();
    renderHistory();
    document.body.classList.toggle('dark-theme', !!config.darkTheme);
    resetTimer(true);
  </script>
</body>
</html>
